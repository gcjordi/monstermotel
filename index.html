<!doctype html>
<html lang="zxx">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#17172f" />
  <title>Monster Motel</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2317172f'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-size='36'%3E%F0%9F%8F%A8%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="app" id="app">
    <div class="top">
      <div class="brand"><div class="logo">🏨</div><div class="title">Monster Motel</div></div>
      <div class="stats" aria-live="polite">
        <div class="stat"><span>☀️</span><span class="value" id="day">1</span></div>
        <div class="stat"><span>🪙</span><span class="value" id="coins">80</span></div>
        <div class="stat"><span>⭐</span><span class="value" id="stars">3</span></div>
        <div class="stat"><span>🌪️</span><span class="value" id="chaos">0</span></div>
      </div>
    </div>

    <div class="board">
      <section class="panel">
        <div class="iconHeader"><div class="bigIcon">🛏️</div><div class="miniRules"><div class="pill">👾➡️🛏️</div><div class="pill">🌙➡️🪙⭐</div></div></div>
        <div class="rooms" id="rooms"></div>
      </section>
      <aside class="side">
        <section class="panel">
          <div class="iconHeader"><div class="bigIcon">🚪👾</div><button class="btn secondary" id="helpBtn" aria-label="help">❔</button></div>
          <div class="queue" id="queue"></div>
        </section>
        <section class="panel">
          <div class="iconHeader"><div class="bigIcon">🛒</div><div class="miniRules"><div class="pill">🪙</div></div></div>
          <div class="shop" id="shop"></div>
        </section>
        <section class="actions">
          <button class="btn" id="nightBtn" aria-label="night">🌙</button>
          <button class="btn danger" id="resetBtn" aria-label="reset">🔄</button>
        </section>
        <section class="panel events" id="events"></section>
      </aside>
    </div>
  </div>

  <div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script src="src/game.js"></script>
</body>
</html>
